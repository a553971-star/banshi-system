name: 每日磐石分析

on:
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests

      - name: 建立資料庫 schema
        run: cd $GITHUB_WORKSPACE && python3 setup_db.py

      - name: 抓取今日資料
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: cd $GITHUB_WORKSPACE && python3 fetch_today.py

      - name: 執行磐石分析
        run: cd $GITHUB_WORKSPACE && python3 main.py

      - name: Commit 結果
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest_decisions.csv state_log.csv daily_log.txt
          git diff --cached --quiet || git commit -m "每日分析 $(date '+%Y-%m-%d %H:%M')"
          git push
